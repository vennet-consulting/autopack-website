name: App CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - '.github/workflows/app-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'site/**'
      - '.github/workflows/app-ci.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Application environment to target
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: true
  TFSTATE_RESOURCE_GROUP_NAME: ${{ vars.TFSTATE_RESOURCE_GROUP_NAME }}
  TFSTATE_STORAGE_ACCOUNT_NAME: ${{ vars.TFSTATE_STORAGE_ACCOUNT_NAME }}
  TFSTATE_CONTAINER_NAME: ${{ vars.TFSTATE_CONTAINER_NAME }}

jobs:
  validate_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate site files
        run: |
          test -f site/index.html
          test -f site/staticwebapp.config.json
          test -f site/robots.txt
          test -f site/sitemap.xml
          python3 - <<'PY'
          from pathlib import Path

          html = Path('site/index.html').read_text(encoding='utf-8')
          required = [
            '<title>',
            'meta name="description"',
            'Request a packaging assessment',
            'WDAC',
          ]
          missing = [item for item in required if item not in html]
          if missing:
            raise SystemExit(f'Missing required markers: {missing}')
          PY

  deploy_site:
    runs-on: ubuntu-latest
    needs: validate_site
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
    env:
      TARGET_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_AZUREAD: true
      ARM_USE_OIDC: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set deployment variables
        run: |
          echo "TF_BACKEND_KEY=autopack-${TARGET_ENVIRONMENT}.tfstate" >> "$GITHUB_ENV"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bootstrap Terraform backend
        run: |
          RESOURCE_GROUP_NAME="${TFSTATE_RESOURCE_GROUP_NAME}" \
          STORAGE_ACCOUNT_NAME="${TFSTATE_STORAGE_ACCOUNT_NAME}" \
          CONTAINER_NAME="${TFSTATE_CONTAINER_NAME}" \
          ./scripts/bootstrap-tfstate.sh

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Resolve deployment target
        id: resolve
        run: |
          terraform -chdir=infra init \
            -backend-config="use_azuread_auth=true" \
            -backend-config="use_oidc=true" \
            -backend-config="resource_group_name=${TFSTATE_RESOURCE_GROUP_NAME}" \
            -backend-config="storage_account_name=${TFSTATE_STORAGE_ACCOUNT_NAME}" \
            -backend-config="container_name=${TFSTATE_CONTAINER_NAME}" \
            -backend-config="key=${TF_BACKEND_KEY}"

          SWA_NAME=""
          RG_NAME=""

          for attempt in $(seq 1 40); do
            if SWA_NAME=$(terraform -chdir=infra output -raw static_web_app_name 2>/dev/null) && \
               RG_NAME=$(terraform -chdir=infra output -raw resource_group_name 2>/dev/null); then
              if SWA_TOKEN=$(az staticwebapp secrets list --name "$SWA_NAME" --resource-group "$RG_NAME" --query properties.apiKey -o tsv 2>/dev/null); then
                break
              fi
            fi

            if [[ "$attempt" == "40" ]]; then
              echo "Static Web App deployment target is not ready yet." >&2
              exit 1
            fi

            echo "Waiting for Static Web App infrastructure to become ready (attempt ${attempt}/40)..."
            sleep 15
          done

          echo "swa_name=$SWA_NAME" >> "$GITHUB_OUTPUT"
          echo "resource_group_name=$RG_NAME" >> "$GITHUB_OUTPUT"
          echo "swa_token=$SWA_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SWA CLI
        run: npm install --global @azure/static-web-apps-cli

      - name: Deploy Static Web App environment
        run: |
          swa deploy ./site \
            --deployment-token "${{ steps.resolve.outputs.swa_token }}" \
            --env production
