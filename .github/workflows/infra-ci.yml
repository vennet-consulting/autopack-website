name: Infrastructure CI/CD

on:
  pull_request:
    branches:
      - main
    paths:
      - 'infra/**'
      - 'scripts/bootstrap-tfstate.sh'
      - '.github/workflows/infra-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - 'scripts/bootstrap-tfstate.sh'
      - '.github/workflows/infra-ci.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Terraform environment to target
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
      apply:
        description: Apply the planned changes
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
    defaults:
      run:
        working-directory: infra
    env:
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_IN_AUTOMATION: true
      TFSTATE_RESOURCE_GROUP_NAME: ${{ vars.TFSTATE_RESOURCE_GROUP_NAME }}
      TFSTATE_STORAGE_ACCOUNT_NAME: ${{ vars.TFSTATE_STORAGE_ACCOUNT_NAME }}
      TFSTATE_CONTAINER_NAME: ${{ vars.TFSTATE_CONTAINER_NAME }}
      TARGET_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Terraform environment variables
        run: |
          echo "TF_BACKEND_KEY=autopack-${TARGET_ENVIRONMENT}.tfstate" >> "$GITHUB_ENV"
          echo "TF_VARS_FILE=environments/${TARGET_ENVIRONMENT}.tfvars" >> "$GITHUB_ENV"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bootstrap Terraform backend
        run: |
          RESOURCE_GROUP_NAME="${TFSTATE_RESOURCE_GROUP_NAME}" \
          STORAGE_ACCOUNT_NAME="${TFSTATE_STORAGE_ACCOUNT_NAME}" \
          CONTAINER_NAME="${TFSTATE_CONTAINER_NAME}" \
          ../scripts/bootstrap-tfstate.sh

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="use_azuread_auth=true" \
            -backend-config="use_oidc=true" \
            -backend-config="resource_group_name=${TFSTATE_RESOURCE_GROUP_NAME}" \
            -backend-config="storage_account_name=${TFSTATE_STORAGE_ACCOUNT_NAME}" \
            -backend-config="container_name=${TFSTATE_CONTAINER_NAME}" \
            -backend-config="key=${TF_BACKEND_KEY}"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        run: terraform plan -no-color -input=false -var-file="${TF_VARS_FILE}"

      - name: Terraform apply
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.apply)
        run: terraform apply -auto-approve -input=false -var-file="${TF_VARS_FILE}"

      - name: Capture infrastructure outputs
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.apply)
        run: |
          terraform output static_web_app_name
          terraform output resource_group_name
          terraform output static_web_app_default_host_name
